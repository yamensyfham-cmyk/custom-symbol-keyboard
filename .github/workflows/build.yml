name: Build Symbol Keyboard

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses & install platforms
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate symbol keyboard layouts
        run: python3 generate_symbols.py

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon -x lint
        env:
          CI: true
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: thorfin-keyboard-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon -x lint
        env:
          CI: true
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: thorfin-keyboard-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
