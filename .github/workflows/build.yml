name: Build Symbol Keyboard

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses & install platforms
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate symbol keyboard layouts
        run: python3 generate_symbols.py

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -alias thorfin -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Thorfin, OU=Dev, O=ThorfinKeyboard, L=Unknown, ST=Unknown, C=US"

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon -x lint
        env:
          CI: true
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon -x lint
        env:
          CI: true
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          name: Thorfin Keyboard ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
