name: Build Symbol Keyboard

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install required SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973" > /dev/null 2>&1 || true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate symbol keyboard layouts
        run: python3 generate_symbols.py

      - name: Build with Gradle (Release)
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          CI: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: symbol-keyboard-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          CI: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: symbol-keyboard-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
